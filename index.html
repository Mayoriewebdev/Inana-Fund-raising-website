<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Fund Raising </title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<body>

    <div id="main-content">

        <nav class="navbar">

            <div class="logo">

            <!-- NAV LINKS -->

            <!-- VIDEO BUTTONS -->

            <a href="https://youtube.com/shorts/cf0ciWJMKEY?si=O0HRFs72kpxqJp5E" class="videobutton btn-one" data-aos="fade-right" data-aos-delay="800"></a>

            <!-- Second Image Button (under the first) -->
            <a href="https://youtube.com/shorts/cf0ciWJMKEY?si=O0HRFs72kpxqJp5E" class="videobutton btn-two" data-aos="fade-right" data-aos-delay="900"></a>

    <script src="style.js"></script>


    <script>
        function toggleMenu() {
            document.getElementById("navLinks").classList.toggle("active");
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000, // animation duration in ms
            once: true,     // whether animation should happen only once - while scrolling down
        });
    </script>

</html>
